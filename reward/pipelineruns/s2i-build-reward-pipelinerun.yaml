apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: s2i-build-quarkusdroneshop-reward-
  namespace: quarkusdroneshop-demo
spec:
  pipelineRef:
    name: s2i-java-pipeline
  serviceAccountName: pipeline
  params:
    - name: IMAGE
      value: image-registry.openshift-image-registry.svc:5000/quarkusdroneshop-demo/quarkusdroneshop-reward
    - name: GIT_REPO
      value: https://github.com/quarkusdroneshop/quarkusdroneshop-reward
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-quarkusdroneshop-reward-pvc