apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: s2i-build-${{ values.app_name }}-
  namespace: quarkusdroneshop-demo
spec:
  serviceAccountName: pipeline
  pipelineRef:
    name: s2i-java-pipeline
  params:
    - name: IMAGE
      value: image-registry.openshift-image-registry.svc:5000/quarkusdroneshop-demo/${{ values.app_name }}
    - name: GIT_REPO
      value: https://github.com/${{ values.git_owner_name }}/${{ values.git_repo_name }}
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-${{ values.app_name }}-pvc