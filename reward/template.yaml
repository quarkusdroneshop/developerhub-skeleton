  steps:
    - id: fetch
      name: Fetch skeleton 
      action: fetch:template
      input:
        url: ./manifest-skeleton
        values:
          app_name: ${{ parameters.app_name }}
          owner: ${{ parameters.owner }}
          git_repo_name: ${{ parameters.git_repo_name }}
          git_host_url: ${{ parameters.git_host_url }}
          git_owner_name: ${{ parameters.git_owner_name }}
          topic-incoming: ${{ parameters.topic-incoming }}
          topic-outgoing: ${{ parameters.topic-outgoing }}
        targetPath: ./tenant

    - id: publish
      name: Push to GitHub 
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.git_owner_name }}&repo=${{ parameters.git_repo_name }}
        repoVisibility: public
        sourcePath: ./tenant
        defaultBranch: main
        protectDefaultBranch: false

    - id: generate-pipelinerun
      name: Generate PipelineRun Manifest
      action: fetch:template
      input:
        url: https://github.com/quarkusdroneshop/developerhub-skeleton/tree/main/reward/pipelineruns
        targetPath: ./tenant/argocd/
        values:
          app_name: ${{ parameters.app_name }}
          git_owner_name: ${{ parameters.git_owner_name }}
          git_repo_name: ${{ parameters.git_repo_name }}

    # ArgoCDデプロイステップをコメントアウトまたは削除
    # - id: argocd
    #   name: Deploy with ArgoCD
    #   action: argocd:create-resources
    #   input:
    #     appName: ${{ parameters.app_name }}
    #     argoInstance: main
    #     namespace: openshift-gitops
    #     repoUrl: https://${{ parameters.git_host_url }}/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}.git
    #     path: 'argocd/'
    #     appProjectName: quarkusdroneshop-demo
    #     appProjectStrict: true
    #     createAppProject: false

    - id: register
      name: Register Catalog into Developer Hub 
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"