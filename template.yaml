apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: tekton-trigger-template
  title: Tekton + Trigger Template
  description: BackstageからTriggerでPipelineRun実行
spec:
  owner: user:default/nmushino
  type: service

  parameters:
    - title: アプリケーション情報
      required: [app_name, git_owner_name, git_repo_name]
      properties:
        app_name:
          type: string
          title: アプリケーション名
          description: "OpenShift の app ラベルと一致させてください (例: web, counter, inventory)"
        git_owner_name:
          type: string
          title: GitHub オーナー名
          description: GitHubのオーナー名
        git_repo_name:
          type: string
          title: GitHub リポジトリ名
          description: 利用しているGitHubのリポジトリを記載
        image_tag:
          type: string
          title: イメージ TAG
          default: latest
          description: 対象のイメージTAGを入力
        system_name:
          type: string
          title: システム名
          description: このコンポーネントが属するシステム名
          enum:
            - a-cluster
            - b-cluster
            - c-cluster
          enumNames:
            - A クラスター
            - B クラスター
            - C クラスター

    - title: Kafka トピック設定
      properties:
        kafka_topic_orders_in_prod:
          type: string
          title: 受信トピック名（prod）
          description: "本番環境で受信する Kafka トピック名（例: shop-asite.orders-in）"
        kafka_topic_orders_in_dev:
          type: string
          title: 受信トピック名（dev）
          description: "開発環境で受信する Kafka トピック名（例: orders-in）"
        kafka_topic_rewards:
          type: string
          title: 送信トピック名（rewards）
          description: "リワードイベントを送信する Kafka トピック名（例: rewards）"

    - title: テスト設定
      description: "Pipeline で実施するテスト・スキャンを選択してください"
      properties:
        enable_checkstyle:
          type: boolean
          title: Checkstyle（コードスタイルチェック）
          description: "Maven checkstyle:check を実行します（fetch 後すぐ並列実行）"
          default: true
        enable_pmd:
          type: boolean
          title: PMD（静的解析）
          description: "Maven pmd:pmd を実行します（fetch 後すぐ並列実行）"
          default: true
        enable_semgrep:
          type: boolean
          title: Semgrep（SAST セキュリティスキャン）
          description: "p/java, p/owasp-top-ten, p/secrets ルールでスキャンします（fetch 後すぐ並列実行）"
          default: true
        enable_gitleaks:
          type: boolean
          title: Gitleaks（シークレットスキャン）
          description: "ソースコード中のシークレット漏洩を検出します（fetch 後すぐ並列実行・最速）"
          default: true
        enable_trivy:
          type: boolean
          title: Trivy（脆弱性スキャン）
          description: "pom.xml を直接スキャンし CVE を検出します（fetch 後すぐ並列実行・ビルド不要）"
          default: true
        enable_wapiti:
          type: boolean
          title: Wapiti（Web セキュリティテスト / DAST）
          description: "デプロイ後のアプリに対して DAST を実行します（デプロイ完了後）"
          default: false

    - title: Tekton情報
      required: [tektonNamespace, clusterDomain]
      properties:
        tektonNamespace:
          type: string
          title: Tekton Namespace
          default: quarkusdroneshop-cicd
        clusterDomain:
          type: string
          title: クラスタードメイン
          description: apps. から始まるドメイン名を記載
          default: apps.ocp.hfczn.sandbox2320.opentlc.com

    - title: 所有者情報
      required: [owner]
      properties:
        owner:
          type: string
          ui:field: EntityPicker
          ui:options:
            allowedKinds: [User]

  steps:
    - id: fetch
      name: テンプレート取得
      action: fetch:template
      input:
        url: ./skeleton
        values:
          app_name: ${{ parameters.app_name }}
          owner: ${{ parameters.owner }}
          system_name: ${{ parameters.system_name }}
          image_tag: ${{ parameters.image_tag }}
          kafka_topic_orders_in_prod: ${{ parameters.kafka_topic_orders_in_prod }}
          kafka_topic_orders_in_dev: ${{ parameters.kafka_topic_orders_in_dev }}
          kafka_topic_rewards: ${{ parameters.kafka_topic_rewards }}
          enable_checkstyle: ${{ parameters.enable_checkstyle }}
          enable_pmd: ${{ parameters.enable_pmd }}
          enable_semgrep: ${{ parameters.enable_semgrep }}
          enable_gitleaks: ${{ parameters.enable_gitleaks }}
          enable_trivy: ${{ parameters.enable_trivy }}
          enable_wapiti: ${{ parameters.enable_wapiti }}

    - id: publish
      name: GitHubへPush
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.git_owner_name }}&repo=${{ parameters.git_repo_name }}
        defaultBranch: main
        repoVisibility: public

    - id: create-namespace
      name: Namespace作成
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/api/v1/namespaces/${{ parameters.tektonNamespace }}?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${{ parameters.tektonNamespace }}

    - id: create-pvc
      name: Shared Workspace PVC作成
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/api/v1/namespaces/${{ parameters.tektonNamespace }}/persistentvolumeclaims/quarkusdroneshop-${{ parameters.app_name }}-shared-workspace-pvc?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: quarkusdroneshop-${{ parameters.app_name }}-shared-workspace-pvc
            namespace: ${{ parameters.tektonNamespace }}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

    - id: create-pipeline
      name: Pipeline登録
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelines/build-and-push-quarkusdroneshop-${{ parameters.app_name }}?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: tekton.dev/v1
          kind: Pipeline
          metadata:
            name: build-and-push-quarkusdroneshop-${{ parameters.app_name }}
            namespace: ${{ parameters.tektonNamespace }}
            labels:
              app: ${{ parameters.app_name }}
              system: ${{ parameters.system_name }}
            annotations:
              backstage.io/image-tag: ${{ parameters.image_tag }}
              backstage.io/created-at: ${{ parameters.created_at }}
          spec:
            params:
              - name: IMAGE_TAG
                type: string
                description: Image Tag Value
                default: latest
              - name: ENABLE_CHECKSTYLE
                type: string
                description: "Checkstyle を実行するか (true/false)"
                default: "${{ parameters.enable_checkstyle }}"
              - name: ENABLE_PMD
                type: string
                description: "PMD を実行するか (true/false)"
                default: "${{ parameters.enable_pmd }}"
              - name: ENABLE_SEMGREP
                type: string
                description: "Semgrep を実行するか (true/false)"
                default: "${{ parameters.enable_semgrep }}"
              - name: ENABLE_GITLEAKS
                type: string
                description: "Gitleaks を実行するか (true/false)"
                default: "${{ parameters.enable_gitleaks }}"
              - name: ENABLE_TRIVY
                type: string
                description: "Trivy を実行するか (true/false)"
                default: "${{ parameters.enable_trivy }}"
              - name: ENABLE_WAPITI
                type: string
                description: "Wapiti を実行するか (true/false)"
                default: "${{ parameters.enable_wapiti }}"
            results:
              - name: junit
                description: JUnit test result summary
                value: $(tasks.pipeline-summary.results.junit)
              - name: semgrep
                description: Semgrep SAST result summary
                value: $(tasks.pipeline-summary.results.semgrep)
              - name: report-url
                description: Test report URL
                value: $(tasks.pipeline-summary.results.report-url)
            workspaces:
              - name: shared-workspace
            tasks:
              # ═══════════════════════════════════════════════════════════════
              # Stage 1: ソース取得
              # ═══════════════════════════════════════════════════════════════
              - name: fetch-repository
                params:
                  - name: url
                    value: "https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}"
                  - name: subdirectory
                    value: ''
                  - name: deleteExisting
                    value: 'true'
                taskRef:
                  kind: Task
                  name: git-clone
                workspaces:
                  - name: output
                    workspace: shared-workspace

              # ═══════════════════════════════════════════════════════════════
              # Stage 2: 並列スキャン（全て fetch-repository 後に同時実行）
              #
              # gitleaks   → シークレット検出（最速: ~10s）
              # semgrep    → SAST セキュリティスキャン（~30s）
              # checkstyle → コードスタイルチェック（Maven 起動込み ~45s）
              # pmd        → 静的解析（Maven 起動込み ~45s）
              # trivy      → pom.xml を直接解析して CVE 検出（~40s）
              #              ※ビルド不要のため maven-run(60s+) より先に終わる
              #              → publish-test-report 実行時には trivy.txt が揃う
              # maven-run  → コンパイル + ユニットテスト（最長: 60s+）
              # ═══════════════════════════════════════════════════════════════

              - name: gitleaks-scan
                runAfter:
                  - fetch-repository
                when:
                  - input: "$(params.ENABLE_GITLEAKS)"
                    operator: in
                    values: ["true"]
                onError: continue
                taskRef:
                  kind: Task
                  name: gitleaks-scan
                params:
                  - name: REPORT_FORMAT
                    value: json
                  - name: REPORT_PATH
                    value: target/gitleaks-report.json
                  - name: EXIT_CODE
                    value: "0"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: semgrep-scan
                runAfter:
                  - fetch-repository
                when:
                  - input: "$(params.ENABLE_SEMGREP)"
                    operator: in
                    values: ["true"]
                onError: continue
                taskRef:
                  kind: Task
                  name: semgrep-scan
                params:
                  - name: RULES
                    value: "p/java,p/owasp-top-ten,p/secrets"
                  - name: FAIL_ON_FINDINGS
                    value: "false"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: checkstyle-run
                runAfter:
                  - fetch-repository
                when:
                  - input: "$(params.ENABLE_CHECKSTYLE)"
                    operator: in
                    values: ["true"]
                onError: continue
                taskRef:
                  kind: Task
                  name: maven-no-settings21
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "checkstyle:check -Dcheckstyle.failsOnError=false"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: pmd-run
                runAfter:
                  - fetch-repository
                when:
                  - input: "$(params.ENABLE_PMD)"
                    operator: in
                    values: ["true"]
                onError: continue
                taskRef:
                  kind: Task
                  name: maven-no-settings21
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "pmd:pmd -Dpmd.failOnViolation=false"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: trivy-scan
                runAfter:
                  - fetch-repository
                when:
                  - input: "$(params.ENABLE_TRIVY)"
                    operator: in
                    values: ["true"]
                onError: continue
                taskRef:
                  kind: Task
                  name: trivy-scan
                params:
                  - name: SCANNERS
                    value: "vuln,secret,misconfig,license"
                  - name: EXIT_CODE
                    value: "0"
                  - name: IGNOREFILE
                    value: .trivyignore.yaml
                  - name: OUTPUT_FILE
                    value: target/trivy.txt
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: maven-unit-test
                runAfter:
                  - fetch-repository
                taskRef:
                  kind: Task
                  name: maven-no-settings21
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "clean test"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: maven-e2e-test
                onError: continue
                runAfter:
                  - maven-unit-test
                taskRef:
                  kind: Task
                  name: maven-no-settings21
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "verify -DskipTests"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: generate-report
                onError: continue
                runAfter:
                  - maven-e2e-test
                taskRef:
                  kind: Task
                  name: maven-no-settings21
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "exec:exec@generate-report"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              # ═══════════════════════════════════════════════════════════════
              # Stage 3: テスト結果集計（generate-report 完了後）
              #   この時点で並列実行した各ツールの出力ファイルが揃っている:
              #   - target/test-report/index.html  (generate-report)
              #   - target/surefire-reports/       (maven-unit-test)
              #   - target/failsafe-reports/       (maven-e2e-test / Playwright)
              #   - target/gitleaks-report.json    (gitleaks-scan)
              #   - target/semgrep-reports/        (semgrep-scan)
              #   - target/checkstyle-result.xml   (checkstyle-run)
              #   - target/pmd.xml                 (pmd-run)
              #   - target/trivy.txt               (trivy-scan)
              # ═══════════════════════════════════════════════════════════════

              - name: print-csv-table
                runAfter:
                  - generate-report
                onError: continue
                taskRef:
                  kind: Task
                  name: print-csv-table
                params:
                  - name: TITLE
                    value: "${{ parameters.app_name }} テスト結果サマリー"
                workspaces:
                  - name: source
                    workspace: shared-workspace

              # ═══════════════════════════════════════════════════════════════
              # Stage 4: レポート公開（publish と summary は並列）
              # ═══════════════════════════════════════════════════════════════

              - name: publish-test-report
                runAfter:
                  - print-csv-table
                taskRef:
                  kind: Task
                  name: publish-test-report
                params:
                  - name: APP_NAME
                    value: ${{ parameters.app_name }}
                  - name: CONTEXT_DIR
                    value: .
                workspaces:
                  - name: source
                    workspace: shared-workspace

              - name: pipeline-summary
                runAfter:
                  - print-csv-table
                taskRef:
                  kind: Task
                  name: pipeline-summary
                params:
                  - name: APP_NAME
                    value: ${{ parameters.app_name }}
                  - name: TEST_TOTAL
                    value: $(tasks.print-csv-table.results.total-tests)
                  - name: TEST_PASSED
                    value: $(tasks.print-csv-table.results.passed)
                  - name: TEST_FAILURES
                    value: $(tasks.print-csv-table.results.failures)
                  - name: TEST_ERRORS
                    value: $(tasks.print-csv-table.results.errors)
                  - name: SEMGREP_HIGH
                    value: $(tasks.semgrep-scan.results.high)
                  - name: SEMGREP_MEDIUM
                    value: $(tasks.semgrep-scan.results.medium)
                  - name: SEMGREP_LOW
                    value: $(tasks.semgrep-scan.results.low)
                  - name: SEMGREP_TOTAL
                    value: $(tasks.semgrep-scan.results.total)
                  - name: REPORT_URL
                    value: $(tasks.publish-test-report.results.report-url)

              # ═══════════════════════════════════════════════════════════════
              # Stage 5: デプロイ（publish-test-report 完了後）
              # ═══════════════════════════════════════════════════════════════

              - name: push-oc-apps
                runAfter:
                  - publish-test-report
                taskRef:
                  name: push-app-task
                params:
                  - name: SCRIPT
                    value: |
                      #!/bin/bash
                      set -e
                      APP=${{ parameters.app_name }}
                      BUILD_NS=quarkusdroneshop-cicd
                      DEPLOY_NS=quarkusdroneshop-demo
                      IMAGE=registry.access.redhat.com/ubi8/openjdk-21:1.20
                      oc policy add-role-to-user system:image-puller \
                        system:serviceaccount:${DEPLOY_NS}:default \
                        -n ${BUILD_NS} 2>/dev/null || true
                      oc delete bc/$APP is/$APP -n $BUILD_NS || true
                      oc delete builds -l buildconfig=$APP -n $BUILD_NS || true
                      oc import-image ubi8-openjdk-21:1.20 \
                        --from=$IMAGE --confirm -n $BUILD_NS 2>/dev/null || true
                      oc new-build --binary --name=$APP \
                        --image-stream=ubi8-openjdk-21:1.20 -n $BUILD_NS
                      oc start-build $APP --from-dir=target/quarkus-app/ --follow -n $BUILD_NS
                      oc delete deployment/$APP svc/$APP route/$APP -n $DEPLOY_NS || true
                      oc new-app $BUILD_NS/$APP --name=$APP --allow-missing-images -n $DEPLOY_NS || true
                      oc expose svc/$APP -n $DEPLOY_NS || true
                      oc label deployment/$APP -n $DEPLOY_NS \
                        app.kubernetes.io/instance=quarkusdroneshop-$APP \
                        app.kubernetes.io/part-of=quarkusdroneshop \
                        app.kubernetes.io/name=$APP --overwrite || true
                      oc label svc/$APP route/$APP -n $DEPLOY_NS \
                        app.kubernetes.io/instance=quarkusdroneshop-$APP \
                        app.kubernetes.io/part-of=quarkusdroneshop --overwrite || true
                      KAFKA_URL=$(oc get configmap droneshop-config -n $DEPLOY_NS \
                        -o jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}' 2>/dev/null || echo "")
                      if [ -n "$KAFKA_URL" ]; then
                        oc set env deployment/$APP \
                          KAFKA_BOOTSTRAP_URLS=$KAFKA_URL \
                          JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n $DEPLOY_NS
                      fi
                workspaces:
                  - name: source
                    workspace: shared-workspace

              # ═══════════════════════════════════════════════════════════════
              # Stage 6: DAST（デプロイ完了後・アプリ起動確認後に実行）
              # ═══════════════════════════════════════════════════════════════

              - name: wapiti-scan
                runAfter:
                  - push-oc-apps
                when:
                  - input: "$(params.ENABLE_WAPITI)"
                    operator: in
                    values: ["true"]
                onError: continue
                taskRef:
                  kind: Task
                  name: wapiti-scan
                params:
                  - name: APP_NAME
                    value: ${{ parameters.app_name }}
                  - name: DEPLOY_NAMESPACE
                    value: quarkusdroneshop-demo
                  - name: OUTPUT_FILE
                    value: target/wapiti.json
                  - name: MAX_SCAN_TIME
                    value: "60"
                workspaces:
                  - name: source
                    workspace: shared-workspace

    - id: register
      name: カタログ登録
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}/blob/main
        catalogInfoPath: /catalog-info.yaml
        optional: true

    - id: register-apis
      name: API カタログ登録
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}/blob/main
        catalogInfoPath: /apis.yaml
        optional: true

    - id: register-resources
      name: Resource カタログ登録
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}/blob/main
        catalogInfoPath: /resources.yaml
        optional: true

    - id: register-kafka-apis
      name: Kafka API カタログ登録
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}/blob/main
        catalogInfoPath: /kafka-apis.yaml
        optional: true

    - id: create-pipelinerun
      name: PipelineRun実行
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/target-cluster/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelineruns
        headers:
          Content-Type: application/json
        body:
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: build-and-push-quarkusdroneshop-${{ parameters.app_name }}-
            namespace: ${{ parameters.tektonNamespace }}
            labels:
              app: ${{ parameters.app_name }}
              app.kubernetes.io/instance: quarkusdroneshop-${{ parameters.app_name }}
              app.kubernetes.io/part-of: quarkusdroneshop
          spec:
            pipelineRef:
              name: build-and-push-quarkusdroneshop-${{ parameters.app_name }}
            params:
              - name: IMAGE_TAG
                value: ${{ parameters.image_tag }}
              - name: ENABLE_CHECKSTYLE
                value: "${{ parameters.enable_checkstyle }}"
              - name: ENABLE_PMD
                value: "${{ parameters.enable_pmd }}"
              - name: ENABLE_SEMGREP
                value: "${{ parameters.enable_semgrep }}"
              - name: ENABLE_GITLEAKS
                value: "${{ parameters.enable_gitleaks }}"
              - name: ENABLE_TRIVY
                value: "${{ parameters.enable_trivy }}"
              - name: ENABLE_WAPITI
                value: "${{ parameters.enable_wapiti }}"
            workspaces:
              - name: shared-workspace
                persistentVolumeClaim:
                  claimName: quarkusdroneshop-${{ parameters.app_name }}-shared-workspace-pvc

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: OpenShift Pipelines
        url: https://console-openshift-console.${{ parameters.clusterDomain }}/k8s/ns/${{ parameters.tektonNamespace }}/tekton.dev~v1~PipelineRun
