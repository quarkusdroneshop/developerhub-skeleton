apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: tekton-trigger-template
  title: Tekton + Trigger Template
  description: BackstageからTriggerでPipelineRun実行
spec:
  owner: user:default/nmushino
  type: service

  parameters:
    - title: アプリケーション情報
      required: [app_name, git_owner_name, git_repo_name]
      properties:
        app_name: { type: string }
        git_owner_name: { type: string }
        git_repo_name: { type: string }
        image_tag: { type: string, default: latest }

    - title: Tekton情報
      required: [tektonNamespace, clusterDomain, tektonToken]
      properties:
        tektonNamespace: { type: string, default: quarkusdroneshop-cicd }
        clusterDomain:
          type: string
          description: apps.<cluster-domain>
          default: apps.example.com
        tektonToken:
          type: string
          description: "Tekton Listener 認証トークン"

    - title: 所有者情報
      required: [owner]
      properties:
        owner:
          type: string
          ui:field: EntityPicker
          ui:options:
            allowedKinds: [User]

  steps:
    - id: fetch
      name: テンプレート取得
      action: fetch:template
      input:
        url: ./skeleton
        values:
          app_name: ${{ parameters.app_name }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: GitHubへPush
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.git_owner_name }}&repo=${{ parameters.git_repo_name }}
        defaultBranch: main
        repoVisibility: public

    - id: create-pvc
      name: Shared Workspace PVC作成
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/kubernetes-api/api/v1/namespaces/${{ parameters.tektonNamespace }}/persistentvolumeclaims
        headers:
          Content-Type: application/json
        body:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${{ parameters.app_name }}-shared-workspace-pvc
            namespace: ${{ parameters.tektonNamespace }}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

    - id: create-pipeline
      name: Pipeline登録
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/kubernetes-api/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelines
        headers:
          Content-Type: application/json
        body:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          metadata:
            name: ${{ parameters.app_name }}
            namespace: ${{ parameters.tektonNamespace }}
            labels:
              app: ${{ parameters.app_name }}
          spec:
            params:
              - default: latest
                description: Image Tag Value
                name: IMAGE_TAG
                type: string
            workspaces:
              - name: shared-workspace
              - name: dependency-check-cache
            tasks:
              - name: fetch-repository
                params:
                  - name: url
                    value: https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}
                  - name: subdirectory
                    value: ''
                  - name: deleteExisting
                    value: 'true'
                taskRef:
                  kind: Task
                  name: git-clone
                workspaces:
                  - name: output
                    workspace: shared-workspace
              - name: semgrep-scan
                runAfter:
                  - fetch-repository
                taskRef:
                  kind: Task
                  name: semgrep-scan
                params:
                  - name: RULES
                    value: p/java,p/owasp-top-ten,p/secrets
                  - name: FAIL_ON_FINDINGS
                    value: 'false'
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: maven-run
                runAfter:
                  - semgrep-scan
                taskRef:
                  kind: Task
                  name: maven-no-settings11
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: clean package
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: owasp-dependency-check
                runAfter:
                  - maven-run
                taskRef:
                  kind: Task
                  name: owasp-dependency-check
                params:
                  - name: FAIL_ON_CVSS
                    value: '7'
                  - name: NVD_API_DELAY
                    value: '16000'
                workspaces:
                  - name: source
                    workspace: shared-workspace
                  - name: cache
                    workspace: dependency-check-cache
              - name: print-csv-table
                runAfter:
                  - owasp-dependency-check
                taskRef:
                  kind: Task
                  name: print-csv-table
                params:
                  - name: TITLE
                    value: ${{ parameters.app_name }} テスト結果サマリー
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: push-oc-apps
                runAfter:
                  - maven-run
                taskRef:
                  name: push-app-task
                params:
                  - name: SCRIPT
                    value: |
                      #!/bin/bash
                      set -e
                      APP=${{ parameters.app_name }}
                      NS=quarkusdroneshop-demo
                      oc delete all -l app=$APP -n $NS || true
                      oc delete bc/$APP -n $NS || true
                      oc new-build --binary --name=$APP --image-stream=java:openjdk-17-ubi8 -n $NS
                      oc start-build $APP --from-dir=target/quarkus-app/ --follow -n $NS
                      oc new-app $APP --name=$APP --allow-missing-images -n $NS
                      oc set env deployment/$APP JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n $NS
                      PGSQL_URL=$(oc get configmap droneshop-config -n $NS -o=jsonpath='{.data.PGSQL_URL}')
                      oc set env deployment/$APP PGSQL_URL=$PGSQL_URL -n $NS
                      PGSQL_USER=$(oc get secret droneshopdb-pguser-droneshopadmin -n $NS -o=jsonpath='{.data.user}' | base64 --decode)
                      oc set env deployment/$APP PGSQL_USER=$PGSQL_USER -n $NS
                      PGSQL_PASS=$(oc get secret droneshopdb-pguser-droneshopadmin -n $NS -o=jsonpath='{.data.password}' | base64 --decode)
                      oc set env deployment/$APP PGSQL_PASS=$PGSQL_PASS -n $NS
                      KAFKA_URL=$(oc get configmap droneshop-config -n $NS -o=jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
                      oc set env deployment/$APP KAFKA_BOOTSTRAP_URLS=$KAFKA_URL -n $NS
                      QUARKUS_LOG_LEVEL=$(oc get configmap droneshop-config -n $NS -o=jsonpath='{.data.QUARKUS_LOG_LEVEL}')
                      oc set env deployment/$APP QUARKUS_LOG_LEVEL=$QUARKUS_LOG_LEVEL -n $NS
                workspaces:
                  - name: source
                    workspace: shared-workspace

    - id: create-pipelinerun
      name: PipelineRun実行
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/kubernetes-api/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelineruns
        headers:
          Content-Type: application/json
        body:
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: ${{ parameters.app_name }}-
            namespace: ${{ parameters.tektonNamespace }}
          spec:
            pipelineRef:
              name: ${{ parameters.app_name }}
            workspaces:
              - name: shared-workspace
                persistentVolumeClaim:
                  claimName: ${{ parameters.app_name }}-shared-workspace-pvc
              - name: dependency-check-cache
                persistentVolumeClaim:
                  claimName: dependency-check-db

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}

      - title: OpenShift Pipelines
        url: https://console-openshift-console.${{ parameters.clusterDomain }}/k8s/ns/${{ parameters.tektonNamespace }}/tekton.dev~v1~PipelineRun