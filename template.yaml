apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: tekton-trigger-template
  title: Tekton + Trigger Template
  description: BackstageからTriggerでPipelineRun実行
spec:
  owner: user:default/nmushino
  type: service

  parameters:
    - title: アプリケーション情報
      required: [app_name, git_owner_name, git_repo_name]
      properties:
        app_name:
          type: string
          title: アプリケーション名
          description: "OpenShift の app ラベルと一致させてください (例: web, counter, inventory)"
        git_owner_name:
          type: string
          title: GitHub オーナー名
        git_repo_name:
          type: string
          title: GitHub リポジトリ名
        image_tag:
          type: string
          title: イメージ TAG
          default: latest
        system_name:
          type: string
          title: システム名
          description: このコンポーネントが属するシステム名
          enum:
            - a-cluster
            - b-cluster
            - c-cluster
          enumNames:
            - A クラスター
            - B クラスター
            - C クラスター

    - title: Tekton情報
      required: [tektonNamespace, clusterDomain]
      properties:
        tektonNamespace: { type: string, default: quarkusdroneshop-cicd }
        clusterDomain:
          type: string
          description: apps.<cluster-domain>
          default: apps.ocp.hfczn.sandbox2320.opentlc.com

    - title: 所有者情報
      required: [owner]
      properties:
        owner:
          type: string
          ui:field: EntityPicker
          ui:options:
            allowedKinds: [User]

  steps:
    - id: fetch
      name: テンプレート取得
      action: fetch:template
      input:
        url: ./skeleton
        values:
          app_name: ${{ parameters.app_name }}
          owner: ${{ parameters.owner }}
          system_name: ${{ parameters.system_name }}
          image_tag: ${{ parameters.image_tag }}

    - id: publish
      name: GitHubへPush
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.git_owner_name }}&repo=${{ parameters.git_repo_name }}
        defaultBranch: main
        repoVisibility: public

    - id: create-namespace
      name: Namespace作成
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/api/v1/namespaces/${{ parameters.tektonNamespace }}?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${{ parameters.tektonNamespace }}

    - id: create-pvc
      name: Shared Workspace PVC作成
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/api/v1/namespaces/${{ parameters.tektonNamespace }}/persistentvolumeclaims/quarkusdroneshop-${{ parameters.app_name }}-shared-workspace-pvc?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: quarkusdroneshop-${{ parameters.app_name }}-shared-workspace-pvc
            namespace: ${{ parameters.tektonNamespace }}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

    - id: create-pipeline
      name: Pipeline登録
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelines/build-and-push-quarkusdroneshop-${{ parameters.app_name }}?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: tekton.dev/v1
          kind: Pipeline
          metadata:
            name: build-and-push-quarkusdroneshop-${{ parameters.app_name }}
            namespace: ${{ parameters.tektonNamespace }}
            labels:
              app: ${{ parameters.app_name }}
              system: ${{ parameters.system_name }}
            annotations:
              backstage.io/image-tag: ${{ parameters.image_tag }}
              backstage.io/created-at: ${{ parameters.created_at }}
          spec:
            params:
              - default: latest
                description: Image Tag Value
                name: IMAGE_TAG
                type: string
            results:
              - name: junit
                description: JUnit test result summary
                value: $(tasks.pipeline-summary.results.junit)
              - name: semgrep
                description: Semgrep SAST result summary
                value: $(tasks.pipeline-summary.results.semgrep)
              - name: owasp
                description: OWASP Dependency-Check result summary
                value: $(tasks.pipeline-summary.results.owasp)
              - name: report-url
                description: Test report URL
                value: $(tasks.pipeline-summary.results.report-url)
            workspaces:
              - name: shared-workspace
              - name: dependency-check-cache
                description: "NVD DB (dependency-check-db PVC, CronJob で毎日更新)"
            tasks:
              - name: owasp-dependency-check-update
                taskRef:
                  name: owasp-dependency-check-update
                workspaces:
                  - name: cache
                    workspace: dependency-check-cache
              - name: fetch-repository
                params:
                  - name: url
                    value: "https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}"
                  - name: subdirectory
                    value: ''
                  - name: deleteExisting
                    value: 'true'
                taskRef:
                  kind: Task
                  name: git-clone
                workspaces:
                  - name: output
                    workspace: shared-workspace
              - name: semgrep-scan
                runAfter:
                  - fetch-repository
                taskRef:
                  kind: Task
                  name: semgrep-scan
                params:
                  - name: RULES
                    value: "p/java,p/owasp-top-ten,p/secrets"
                  - name: FAIL_ON_FINDINGS
                    value: "false"
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: maven-run
                runAfter:
                  - semgrep-scan
                taskRef:
                  kind: Task
                  name: maven-no-settings21
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "clean verify"
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: owasp-dependency-check
                runAfter:
                  - maven-run
                  - owasp-dependency-check-update
                taskRef:
                  kind: Task
                  name: owasp-dependency-check
                params:
                  - name: FAIL_ON_CVSS
                    value: "8"
                  - name: NVD_API_DELAY
                    value: "16000"
                workspaces:
                  - name: source
                    workspace: shared-workspace
                  - name: cache
                    workspace: dependency-check-cache
              - name: print-csv-table
                runAfter:
                  - owasp-dependency-check
                onError: continue
                taskRef:
                  kind: Task
                  name: print-csv-table
                params:
                  - name: TITLE
                    value: "${{ parameters.app_name }} テスト結果サマリー"
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: publish-test-report
                runAfter:
                  - print-csv-table
                taskRef:
                  kind: Task
                  name: publish-test-report
                params:
                  - name: APP_NAME
                    value: ${{ parameters.app_name }}
                  - name: CONTEXT_DIR
                    value: .
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: pipeline-summary
                runAfter:
                  - publish-test-report
                taskRef:
                  kind: Task
                  name: pipeline-summary
                params:
                  - name: APP_NAME
                    value: ${{ parameters.app_name }}
                  - name: TEST_TOTAL
                    value: $(tasks.print-csv-table.results.total-tests)
                  - name: TEST_PASSED
                    value: $(tasks.print-csv-table.results.passed)
                  - name: TEST_FAILURES
                    value: $(tasks.print-csv-table.results.failures)
                  - name: TEST_ERRORS
                    value: $(tasks.print-csv-table.results.errors)
                  - name: SEMGREP_HIGH
                    value: $(tasks.semgrep-scan.results.high)
                  - name: SEMGREP_MEDIUM
                    value: $(tasks.semgrep-scan.results.medium)
                  - name: SEMGREP_LOW
                    value: $(tasks.semgrep-scan.results.low)
                  - name: SEMGREP_TOTAL
                    value: $(tasks.semgrep-scan.results.total)
                  - name: OWASP_CRITICAL
                    value: $(tasks.owasp-dependency-check.results.critical)
                  - name: OWASP_HIGH
                    value: $(tasks.owasp-dependency-check.results.high)
                  - name: OWASP_MEDIUM
                    value: $(tasks.owasp-dependency-check.results.medium)
                  - name: OWASP_LOW
                    value: $(tasks.owasp-dependency-check.results.low)
                  - name: OWASP_TOTAL
                    value: $(tasks.owasp-dependency-check.results.total)
                  - name: REPORT_URL
                    value: $(tasks.publish-test-report.results.report-url)
              - name: push-oc-apps
                runAfter:
                  - print-csv-table
                taskRef:
                  name: push-app-task
                params:
                  - name: SCRIPT
                    value: |
                      #!/bin/bash
                      set -e
                      oc login --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) \
                        --server=https://kubernetes.default.svc --insecure-skip-tls-verify=true
                      APP=${{ parameters.app_name }}
                      NS=quarkusdroneshop-cicd
                      IMAGE=registry.access.redhat.com/ubi8/openjdk-21:1.20
                      oc delete all -l app=$APP -n $NS || true
                      oc delete bc/$APP -n $NS || true
                      oc new-build --binary --name=$APP --docker-image=$IMAGE -n $NS
                      oc patch bc/$APP -n $NS --type=json \
                        -p '[{"op":"replace","path":"/spec/strategy/sourceStrategy/from","value":{"kind":"DockerImage","name":"'"$IMAGE"'"}}]'
                      oc start-build $APP --from-dir=target/quarkus-app/ --follow -n $NS
                      oc new-app $APP --name=$APP --allow-missing-images -n $NS || true
                      oc expose svc/$APP -n $NS || true
                      oc label svc/$APP -n $NS app.kubernetes.io/instance=quarkusdroneshop-$APP app.kubernetes.io/part-of=quarkusdroneshop --overwrite
                      oc label route/$APP -n $NS app.kubernetes.io/instance=quarkusdroneshop-$APP app.kubernetes.io/part-of=quarkusdroneshop --overwrite || true
                      KAFKA_URL=$(oc get configmap droneshop-config -n $NS -o jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
                      oc set env deployment/$APP KAFKA_BOOTSTRAP_URLS=$KAFKA_URL JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n $NS
                      oc patch deployment/$APP -n $NS --type=json \
                        -p="[
                          {\"op\":\"add\",\"path\":\"/metadata/labels/app.kubernetes.io~1name\",\"value\":\"$APP\"},
                          {\"op\":\"add\",\"path\":\"/metadata/labels/app.kubernetes.io~1part-of\",\"value\":\"quarkusdroneshop\"},
                          {\"op\":\"add\",\"path\":\"/metadata/labels/app.kubernetes.io~1instance\",\"value\":\"quarkusdroneshop-$APP\"},
                          {\"op\":\"add\",\"path\":\"/spec/template/metadata/labels/app\",\"value\":\"$APP\"},
                          {\"op\":\"add\",\"path\":\"/spec/template/metadata/labels/app.kubernetes.io~1instance\",\"value\":\"quarkusdroneshop-$APP\"},
                          {\"op\":\"add\",\"path\":\"/spec/template/metadata/labels/app.kubernetes.io~1name\",\"value\":\"$APP\"},
                          {\"op\":\"add\",\"path\":\"/spec/template/metadata/labels/app.kubernetes.io~1part-of\",\"value\":\"quarkusdroneshop\"}
                        ]"
                workspaces:
                  - name: source
                    workspace: shared-workspace

    - id: register
      name: カタログ登録
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}/blob/main
        catalogInfoPath: /catalog-info.yaml
        optional: true

    - id: create-pipelinerun
      name: PipelineRun実行
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/target-cluster/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelineruns
        headers:
          Content-Type: application/json
        body:
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: build-and-push-quarkusdroneshop-${{ parameters.app_name }}-
            namespace: ${{ parameters.tektonNamespace }}
            labels:
              app: ${{ parameters.app_name }}
              app.kubernetes.io/instance: quarkusdroneshop-${{ parameters.app_name }}
              app.kubernetes.io/part-of: quarkusdroneshop
          spec:
            pipelineRef:
              name: build-and-push-quarkusdroneshop-${{ parameters.app_name }}
            workspaces:
              - name: shared-workspace
                persistentVolumeClaim:
                  claimName: quarkusdroneshop-${{ parameters.app_name }}-shared-workspace-pvc
              - name: dependency-check-cache
                persistentVolumeClaim:
                  claimName: dependency-check-db

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: OpenShift Pipelines
        url: https://console-openshift-console.${{ parameters.clusterDomain }}/k8s/ns/${{ parameters.tektonNamespace }}/tekton.dev~v1~PipelineRun
