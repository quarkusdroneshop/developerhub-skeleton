apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: tekton-gitops-trigger-template
  title: Tekton GitOps + Trigger Template
  description: ArgoCDгЃ§Pipelineз®Ўзђ†гЃ—гЂЃBackstageгЃ‹г‚‰TriggerгЃ§PipelineRunе®џиЎЊ
spec:
  owner: user:default/nmushino
  type: service

  parameters:
    - title: г‚ўгѓ—гѓЄг‚±гѓјг‚·гѓ§гѓіжѓ…е ±
      required: [app_name, git_owner_name, git_repo_name]
      properties:
        app_name: { type: string }
        git_owner_name: { type: string }
        git_repo_name: { type: string }
        image_tag: { type: string, default: latest }

    - title: Tektonжѓ…е ±
      required: [tektonNamespace, clusterDomain, tektonToken]
      properties:
        tektonNamespace: { type: string, default: quarkusdroneshop-cicd }
        clusterDomain:
          type: string
          description: apps.<cluster-domain>
          default: apps.example.com
        tektonToken:
          type: string
          description: "Tekton Listener иЄЌиЁјгѓ€гѓјг‚Їгѓі"

    - title: ж‰Ђжњ‰иЂ…жѓ…е ±
      required: [owner]
      properties:
        owner:
          type: string
          ui:field: EntityPicker
          ui:options:
            allowedKinds: [User]

  steps:
    - id: fetch
      name: гѓ†гѓігѓ—гѓ¬гѓјгѓ€еЏ–еѕ—
      action: fetch:template
      input:
        url: ./skeleton
        values:
          app_name: ${{ parameters.app_name }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: GitHubгЃёPush
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.git_owner_name }}&repo=${{ parameters.git_repo_name }}
        defaultBranch: main
        repoVisibility: public

    - id: deploy-argo
      name: ArgoCD Pipeline з™»йЊІ
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/argocd/api/v1/applications
        headers:
          Content-Type: application/json
        body:
          metadata:
            name: ${{ parameters.app_name }}-pipeline
            namespace: quarkusdroneshop-cicd
          spec:
            project: default
            source:
              repoURL: ${{ steps['publish'].output.remoteUrl }}
              path: pipeline/quarkusdroneshop-reward
              targetRevision: HEAD
            destination:
              server: https://kubernetes.default.svc
              namespace: quarkusdroneshop-cicd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
        
    - id: create-pipelinerun
      name: Create PipelineRun
      action: kubernetes:create-pipelinerun
      input:
        namespace: quarkusdroneshop-cicd
        manifest: |
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: reward-run-
          spec:
            pipelineRef:
              name: build-and-push-quarkusdroneshop-reward
            workspaces:
              - name: shared-workspace
                persistentVolumeClaim:
                  claimName: quarkusdroneshop-reward-shared-workspace-pvc

    - id: register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}

      - title: OpenShift Pipelines
        url: https://console-openshift-console.${{ parameters.clusterDomain }}/k8s/ns/${{ parameters.tektonNamespace }}/tekton.dev~v1~PipelineRun

      - title: Backstage Entity
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}