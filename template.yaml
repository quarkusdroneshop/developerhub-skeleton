apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: tekton-trigger-template
  title: Tekton + Trigger Template
  description: BackstageからTriggerでPipelineRun実行
spec:
  owner: user:default/nmushino
  type: service

  parameters:
    - title: アプリケーション情報
      required: [app_name, git_owner_name, git_repo_name]
      properties:
        app_name: { type: string }
        git_owner_name: { type: string }
        git_repo_name: { type: string }
        image_tag: { type: string, default: latest }

    - title: Tekton情報
      required: [tektonNamespace, clusterDomain]
      properties:
        tektonNamespace: { type: string, default: quarkusdroneshop-cicd }
        clusterDomain:
          type: string
          description: apps.<cluster-domain>
          default: apps.ocp.hfczn.sandbox2320.opentlc.com

    - title: 所有者情報
      required: [owner]
      properties:
        owner:
          type: string
          ui:field: EntityPicker
          ui:options:
            allowedKinds: [User]

  steps:
    - id: fetch
      name: テンプレート取得
      action: fetch:template
      input:
        url: ./skeleton
        values:
          app_name: ${{ parameters.app_name }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: GitHubへPush
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.git_owner_name }}&repo=${{ parameters.git_repo_name }}
        defaultBranch: main
        repoVisibility: public

    - id: create-namespace
      name: Namespace作成
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/api/v1/namespaces/${{ parameters.tektonNamespace }}?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${{ parameters.tektonNamespace }}

    - id: create-pvc
      name: Shared Workspace PVC作成
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/api/v1/namespaces/${{ parameters.tektonNamespace }}/persistentvolumeclaims/${{ parameters.app_name }}-shared-workspace-pvc?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${{ parameters.app_name }}-shared-workspace-pvc
            namespace: ${{ parameters.tektonNamespace }}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

    - id: create-pipeline
      name: Pipeline登録
      action: http:backstage:request
      input:
        method: PATCH
        path: /proxy/target-cluster/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelines/build-and-push-${{ parameters.app_name }}?fieldManager=backstage&force=true
        headers:
          Content-Type: application/apply-patch+yaml
        body: |
          apiVersion: tekton.dev/v1
          kind: Pipeline
          metadata:
            name: build-and-push-${{ parameters.app_name }}
            namespace: ${{ parameters.tektonNamespace }}
            labels:
              app: ${{ parameters.app_name }}
          spec:
            params:
              - default: latest
                description: Image Tag Value
                name: IMAGE_TAG
                type: string
            workspaces:
              - name: shared-workspace
              - name: dependency-check-cache
            tasks:
              - name: fetch-repository
                params:
                  - name: url
                    value: "https://github.com/${{ parameters.git_owner_name }}/${{ parameters.git_repo_name }}"
                  - name: subdirectory
                    value: ''
                  - name: deleteExisting
                    value: 'true'
                taskRef:
                  kind: Task
                  name: git-clone
                workspaces:
                  - name: output
                    workspace: shared-workspace
              - name: semgrep-scan
                runAfter:
                  - fetch-repository
                taskRef:
                  kind: Task
                  name: semgrep-scan
                params:
                  - name: RULES
                    value: "p/java,p/owasp-top-ten,p/secrets"
                  - name: FAIL_ON_FINDINGS
                    value: "false"
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: maven-run
                runAfter:
                  - semgrep-scan
                taskRef:
                  kind: Task
                  name: maven-no-settings11
                params:
                  - name: CONTEXT_DIR
                    value: .
                  - name: GOALS
                    value: "clean package"
                workspaces:
                  - name: source
                    workspace: shared-workspace
              - name: owasp-dependency-check
                runAfter:
                  - maven-run
                taskRef:
                  kind: Task
                  name: owasp-dependency-check
                params:
                  - name: FAIL_ON_CVSS
                    value: "7"
                  - name: NVD_API_DELAY
                    value: "16000"
                workspaces:
                  - name: source
                    workspace: shared-workspace
                  - name: cache
                    workspace: dependency-check-cache
              - name: push-oc-apps
                runAfter:
                  - maven-run
                taskRef:
                  name: push-app-task
                params:
                  - name: SCRIPT
                    value: |
                      #!/bin/bash
                      set -e
                      APP=${{ parameters.app_name }}
                      NS=quarkusdroneshop-demo
                      oc new-build --binary --name=$APP --image-stream=java:openjdk-17-ubi8 -n $NS || true
                      oc start-build $APP --from-dir=target/quarkus-app/ --follow -n $NS
                      oc new-app $APP --name=$APP --allow-missing-images -n $NS || true
                workspaces:
                  - name: source
                    workspace: shared-workspace

    - id: create-pipelinerun
      name: PipelineRun実行
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/target-cluster/apis/tekton.dev/v1/namespaces/${{ parameters.tektonNamespace }}/pipelineruns
        headers:
          Content-Type: application/json
        body:
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: build-and-push-${{ parameters.app_name }}-
            namespace: ${{ parameters.tektonNamespace }}
          spec:
            pipelineRef:
              name: build-and-push-${{ parameters.app_name }}
            workspaces:
              - name: shared-workspace
                persistentVolumeClaim:
                  claimName: ${{ parameters.app_name }}-shared-workspace-pvc
              - name: dependency-check-cache
                persistentVolumeClaim:
                  claimName: dependency-check-db

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['publish'].output.remoteUrl }}

      - title: OpenShift Pipelines
        url: https://console-openshift-console.${{ parameters.clusterDomain }}/k8s/ns/${{ parameters.tektonNamespace }}/tekton.dev~v1~PipelineRun